# dev-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  namespace: dev
spec:
  replicas: 1          # Fewer replicas for dev
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
        env: dev
    spec:
      containers:
      - name: web-server
        image: nginx:latest
        ports:
        - containerPort: 80
        env:
        - name: ENVIRONMENT
          value: "development"